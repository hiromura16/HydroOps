# docker/traefik/traefik.yml
# Traefik 静的設定ファイル

# --- グローバル設定 ---
global:
  checkNewVersion: true
  sendAnonymousUsage: false

# --- APIとダッシュボード ---
api:
  dashboard: true
  insecure: false # 開発時のみ。本番ではfalseにし、ルーターで認証を設定

# --- エントリーポイント定義 ---
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        options: default

# --- プロバイダー設定 ---
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: "hydro_ops_traefik_public"

  file:
    directory: /etc/traefik/dynamic_conf/
    watch: true

# --- ログ設定 ---
log:
  level: DEBUG
  format: common

# --- アクセスログ設定 ---
accessLog:
  format: common

# --- Let's Encrypt 自動証明書取得・更新設定 ---
# HTTP-01 チャレンジを使用。ポート80への外部アクセスが必須。
# 証明書は /letsencrypt/acme.json (Docker ボリューム) に保存され、90日ごとに自動更新される。
certificatesResolvers:
  letsencrypt:
    acme:
      email: your-email@example.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

# --- TLS設定 ---
tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
